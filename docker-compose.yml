services:
  my-rag-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-rag-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATA_DIR: /app/data
      INDEX_PATH: /app/faiss_index
      EMBEDDING_MODEL: /app/local_models/bge-small-zh-v1.5
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
      - ./local_models:/app/local_models
    restart: unless-stopped
