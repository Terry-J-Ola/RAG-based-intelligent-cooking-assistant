<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <script>
        (function() {
            var t = localStorage.getItem("theme");
            if (!t) t = window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
</head>
<body>
    <div class="page-shell">
        <aside class="hero-panel">
            <p class="eyebrow">FASTAPI + RAG</p>
            <h1>RAG 菜谱助手</h1>
            <p class="hero-copy">
                把你现有的本地知识库接成一个可以直接提问、查看答案与来源的网页版本。
            </p>
            <div class="tips-card">
                <p class="tips-title">可直接试试这些问题</p>
                <button class="prompt-chip" data-prompt="宫保鸡丁怎么做？" type="button">宫保鸡丁怎么做？</button>
                <button class="prompt-chip" data-prompt="适合新手的家常菜有哪些？" type="button">适合新手的家常菜有哪些？</button>
                <button class="prompt-chip" data-prompt="红烧肉需要准备哪些食材？" type="button">红烧肉需要准备哪些食材？</button>
            </div>
        </aside>

        <main class="chat-panel">
            <div class="panel-header">
                <div>
                    <p class="section-kicker">Web Demo</p>
                    <h2>开始提问</h2>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="icon-btn" type="button" title="切换主题">🌙</button>
                    <button id="clearChat" class="icon-btn" type="button" title="清除对话">🗑️</button>
                    <span id="statusBadge" class="status-badge">就绪</span>
                </div>
            </div>

            <section id="conversation" class="conversation">
                <div class="message assistant-message">
                    <div class="message-avatar">🍳</div>
                    <div class="message-content">
                        <p>你好！我是 RAG 菜谱助手，你可以问我任何与菜谱相关的问题。</p>
                    </div>
                </div>
            </section>

            <form id="chatForm" class="composer">
                <div class="composer-inner">
                    <textarea
                        id="queryInput"
                        name="query"
                        rows="1"
                        placeholder="输入你的问题，Enter 发送..."
                        required
                    ></textarea>
                    <button id="submitButton" type="submit" class="send-btn" title="发送 (Enter)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="{{ url_for('static', path='/app.js') }}"></script>
</body>
</html>
